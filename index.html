<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<!-- ═══════════════════════════════════════════
     VISUOSCOPE TEMPLATE: RESTAURANT / NYAMA CHOMA
     
     TO CUSTOMISE FOR A NEW CLIENT:
     1. Replace all Nerkwo Restaurant with actual name
     2. Replace Best Choma in Nairobi with their tagline
     3. Replace South B with their area e.g. "Westlands"
     4. Replace Plainsview Road, South B with their full address
     5. Replace +254 721 541 206 with their phone number e.g. 0712345678
     6. Replace 254721541206 with WhatsApp number e.g. 254712345678
     7. Replace info@nerkworestaurant.co.ke with their email
     8. Replace 10:00 AM – 10:00 PM Daily with opening hours
     9. Update menu items and prices in the menu section
     10. Change --amber accent colour if client has brand colours
     
     DEPLOY: Upload as index.html to GitHub repo → enable Pages
═══════════════════════════════════════════ -->
<title>Nerkwo Restaurant — South B, Nairobi</title>
<meta name="description" content="Nerkwo Restaurant serves the best nyama choma and Kenyan cuisine in South B, Nairobi. Fresh meat, great vibes, and unforgettable flavours."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&family=Satisfy&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════ RESET & TOKENS ═══════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* BRAND COLOURS — update for each client */
  --amber:    #c8862a;
  --amber-l:  #e8a84a;
  --amber-d:  #9a6418;
  --cream:    #fdf6ec;
  --cream-2:  #f5ead8;
  --brown:    #2c1a0e;
  --brown-2:  #3d2511;
  --brown-3:  #5a3820;
  --warm:     #7a4f2e;
  --steel:    #8a7060;
  --light:    #c8b09a;
  --border:   rgba(200,134,42,.2);
  --border-l: rgba(200,134,42,.08);
  /* FONTS */
  --font-h:   'Playfair Display', serif;
  --font-s:   'Satisfy', cursive;
  --font-b:   'Lato', sans-serif;
  --ease:     cubic-bezier(.4,0,.2,1);
}
html{scroll-behavior:smooth}
body{font-family:var(--font-b);background:var(--cream);color:var(--brown);line-height:1.7;overflow-x:hidden}
::selection{background:var(--amber);color:#fff}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--cream)}
::-webkit-scrollbar-thumb{background:var(--amber);border-radius:2px}
img{display:block;max-width:100%}

/* ═══════════════════════ UTILS ═══════════════════════ */
.container{max-width:1140px;margin:0 auto;padding:0 32px}
.amber{color:var(--amber)}
.sp{padding:96px 0}
.sp-sm{padding:56px 0}
.script{font-family:var(--font-s);color:var(--amber);font-size:1.3em;line-height:1.2;display:block;margin-bottom:4px}

/* ═══════════════════════ NAV ═══════════════════════ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  padding:0;
  background:rgba(44,26,14,.96);
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(200,134,42,.15);
  transition:background .3s,border-color .3s;
}
nav.light{background:rgba(253,246,236,.97);border-bottom-color:var(--border)}
nav.scrolled{box-shadow:0 4px 32px rgba(44,26,14,.2)}
.nav-inner{display:flex;align-items:stretch;justify-content:space-between;height:70px}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer}
.logo-emblem{width:40px;height:40px;border:1.5px solid var(--amber);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-emblem span{font-family:var(--font-h);font-size:18px;color:var(--amber);font-weight:700;line-height:1}
.logo-words .l1{font-family:var(--font-h);font-size:17px;font-weight:700;color:var(--cream);letter-spacing:.5px;line-height:1.1}
.logo-words .l2{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--amber);margin-top:1px}
nav.light .logo-words .l1{color:var(--brown)}
.nav-links{display:flex;align-items:center;list-style:none}
.nav-links a{display:flex;align-items:center;height:70px;padding:0 18px;text-decoration:none;color:rgba(253,246,236,.7);font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;cursor:pointer}
.nav-links a:hover,.nav-links a.active{color:var(--amber);border-bottom-color:var(--amber)}
nav.light .nav-links a{color:var(--warm)}
nav.light .nav-links a:hover,nav.light .nav-links a.active{color:var(--amber-d)}
.nav-res{display:flex;align-items:center;background:var(--amber);color:var(--brown);text-decoration:none;padding:0 24px;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;transition:background .2s;cursor:pointer;flex-shrink:0;border:none;font-family:var(--font-b)}
.nav-res:hover{background:var(--amber-l)}
.hbg{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px;margin:auto 0}
.hbg span{display:block;width:22px;height:2px;background:var(--cream);border-radius:1px;transition:.3s}
nav.light .hbg span{background:var(--brown)}

/* ═══════════════════════ HERO ═══════════════════════ */
.hero{height:100vh;min-height:640px;position:relative;overflow:hidden;display:flex;align-items:center}
.hero-bg{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=1800&q=85&fit=crop') center/cover no-repeat}
.hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(44,26,14,.92) 0%,rgba(44,26,14,.7) 50%,rgba(44,26,14,.4) 100%)}
/* warm grain overlay */
.hero-bg::before{content:'';position:absolute;inset:0;z-index:1;opacity:.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");background-size:200px}
.hero-con{position:relative;z-index:2;width:100%}
.hero-inner{max-width:680px}
.hero-eyebrow{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.hero-eyebrow-line{width:40px;height:1px;background:var(--amber);flex-shrink:0}
.hero-eyebrow-txt{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--amber);font-weight:700}
.hero h1{font-family:var(--font-h);font-size:clamp(52px,7vw,88px);font-weight:700;color:#fff;line-height:.95;letter-spacing:-1px;margin-bottom:24px}
.hero h1 em{font-style:italic;color:var(--amber-l)}
.hero-desc{color:rgba(253,246,236,.7);font-size:17px;font-weight:300;line-height:1.85;max-width:460px;margin-bottom:40px}
.hero-acts{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.hero-badge{position:absolute;bottom:48px;right:0;background:rgba(44,26,14,.9);border:1px solid var(--border);padding:20px 24px;display:flex;gap:20px}
.hb-item{text-align:center}
.hb-num{font-family:var(--font-h);font-size:28px;color:var(--amber);line-height:1;font-weight:700}
.hb-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--light);margin-top:3px}
.hb-div{width:1px;background:var(--border);align-self:stretch}

/* ═══════════════════════ BUTTONS ═══════════════════════ */
.btn-amber{display:inline-flex;align-items:center;gap:8px;background:var(--amber);color:#fff;text-decoration:none;padding:14px 30px;font-family:var(--font-b);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;transition:background .2s,transform .2s;border:none;cursor:pointer;border-radius:2px}
.btn-amber:hover{background:var(--amber-l);transform:translateY(-2px)}
.btn-outline{display:inline-flex;align-items:center;gap:8px;background:transparent;color:#fff;text-decoration:none;padding:14px 30px;font-family:var(--font-b);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border:1px solid rgba(255,255,255,.3);transition:border-color .2s,color .2s;cursor:pointer;border-radius:2px}
.btn-outline:hover{border-color:var(--amber);color:var(--amber)}
.btn-amber-outline{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--amber);text-decoration:none;padding:13px 28px;font-family:var(--font-b);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border:1.5px solid var(--amber);transition:background .2s,color .2s;cursor:pointer;border-radius:2px}
.btn-amber-outline:hover{background:var(--amber);color:#fff}
.btn-brown{display:inline-flex;align-items:center;gap:8px;background:var(--brown);color:var(--cream);text-decoration:none;padding:14px 30px;font-family:var(--font-b);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;transition:background .2s;cursor:pointer;border-radius:2px;border:none}
.btn-brown:hover{background:var(--brown-2)}

/* ═══════════════════════ SECTION HEADER ═══════════════════════ */
.sec-hdr{margin-bottom:52px}
.sec-hdr h2{font-family:var(--font-h);font-size:clamp(36px,4.5vw,54px);font-weight:700;line-height:1.05;letter-spacing:-.5px;margin-bottom:14px;color:var(--brown)}
.sec-hdr h2 em{font-style:italic;color:var(--amber)}
.sec-hdr p{color:var(--warm);font-size:16px;font-weight:300;max-width:500px;line-height:1.8}
.sec-hdr.ctr{text-align:center}.sec-hdr.ctr p{margin:0 auto}
.sec-hdr.lt h2,.sec-hdr.lt p{color:var(--cream)}.sec-hdr.lt p{color:var(--light)}

/* ═══════════════════════ DIVIDER ═══════════════════════ */
.ornament{display:flex;align-items:center;justify-content:center;gap:16px;margin:0 auto 48px;opacity:.5}
.ornament-line{flex:1;max-width:80px;height:1px;background:var(--amber)}
.ornament-icon{color:var(--amber);font-size:18px}

/* ═══════════════════════ FEATURE STRIP ═══════════════════════ */
.feature-strip{background:var(--brown);padding:32px 0;border-top:1px solid rgba(200,134,42,.15);border-bottom:1px solid rgba(200,134,42,.15)}
.feature-strip-inner{display:grid;grid-template-columns:repeat(4,1fr);gap:0}
.feat-item{padding:16px 24px;border-right:1px solid rgba(200,134,42,.15);display:flex;align-items:center;gap:14px}
.feat-item:last-child{border-right:none}
.feat-icon{font-size:24px;flex-shrink:0}
.feat-title{font-family:var(--font-h);font-size:14px;font-weight:600;color:var(--cream);line-height:1.2}
.feat-sub{font-size:11px;color:var(--light);font-weight:300;margin-top:2px}

/* ═══════════════════════ MENU ═══════════════════════ */
.menu-section{background:var(--cream)}
.menu-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:48px;overflow-x:auto}
.menu-tab{padding:14px 24px;font-family:var(--font-b);font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--warm);cursor:pointer;background:none;border:none;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap;flex-shrink:0}
.menu-tab:hover,.menu-tab.active{color:var(--amber);border-bottom-color:var(--amber)}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.menu-panel{display:none}.menu-panel.active{display:block}
.menu-item{display:flex;align-items:flex-start;gap:20px;padding:24px 0;border-bottom:1px solid var(--border-l);position:relative}
.menu-item:last-child{border-bottom:none}
.menu-item-img{width:80px;height:80px;border-radius:4px;overflow:hidden;flex-shrink:0}
.menu-item-img img{width:100%;height:100%;object-fit:cover;filter:saturate(.9)}
.menu-item-body{flex:1}
.menu-item-name{font-family:var(--font-h);font-size:17px;font-weight:600;color:var(--brown);margin-bottom:4px}
.menu-item-desc{font-size:13px;color:var(--warm);font-weight:300;line-height:1.6}
.menu-item-price{font-family:var(--font-h);font-size:18px;font-weight:700;color:var(--amber);flex-shrink:0;margin-top:2px}
.menu-item-tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;border-radius:2px;margin-top:6px}
.tag-popular{background:rgba(200,134,42,.15);color:var(--amber-d);border:1px solid var(--border)}
.tag-new{background:rgba(44,26,14,.08);color:var(--brown);border:1px solid rgba(44,26,14,.15)}
.tag-spicy{background:rgba(200,50,30,.1);color:#c83218;border:1px solid rgba(200,50,30,.2)}

/* ═══════════════════════ ABOUT ═══════════════════════ */
.about-section{background:var(--brown-2)}
.about-inner{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.about-imgs{position:relative;height:560px}
.about-img-main{position:absolute;top:0;left:0;width:75%;height:80%;overflow:hidden;border-radius:4px}
.about-img-main img{width:100%;height:100%;object-fit:cover;filter:brightness(.85) saturate(.9)}
.about-img-accent{position:absolute;bottom:0;right:0;width:55%;height:55%;overflow:hidden;border-radius:4px;border:4px solid var(--brown-2)}
.about-img-accent img{width:100%;height:100%;object-fit:cover;filter:brightness(.85) saturate(.9)}
.about-img-badge{position:absolute;top:50%;left:60%;transform:translate(-50%,-50%);background:var(--amber);padding:20px 24px;text-align:center;z-index:2;border-radius:2px}
.aib-num{font-family:var(--font-h);font-size:40px;color:#fff;font-weight:700;line-height:1}
.aib-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.8);margin-top:4px}
.about-text p{color:var(--light);font-size:15px;font-weight:300;line-height:1.9;margin-bottom:16px}
.about-sig{font-family:var(--font-s);font-size:32px;color:var(--amber);margin-top:24px}
.about-sig-sub{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--light);margin-top:4px}

/* ═══════════════════════ SPECIALS ═══════════════════════ */
.specials{background:var(--cream-2)}
.specials-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.special-card{background:var(--cream);border-radius:4px;overflow:hidden;box-shadow:0 4px 20px rgba(44,26,14,.08);transition:transform .3s,box-shadow .3s}
.special-card:hover{transform:translateY(-6px);box-shadow:0 12px 40px rgba(44,26,14,.15)}
.special-img{height:220px;overflow:hidden;position:relative}
.special-img img{width:100%;height:100%;object-fit:cover;filter:saturate(.9) brightness(.95);transition:transform .5s,filter .4s}
.special-card:hover .special-img img{transform:scale(1.05);filter:saturate(1) brightness(1)}
.special-day{position:absolute;top:14px;left:14px;background:var(--amber);padding:5px 12px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#fff;border-radius:2px}
.special-body{padding:22px 24px}
.special-name{font-family:var(--font-h);font-size:20px;font-weight:700;color:var(--brown);margin-bottom:6px}
.special-desc{font-size:13px;color:var(--warm);font-weight:300;line-height:1.65;margin-bottom:16px}
.special-footer{display:flex;align-items:center;justify-content:space-between}
.special-price{font-family:var(--font-h);font-size:22px;font-weight:700;color:var(--amber)}
.special-price span{font-size:13px;font-weight:400;color:var(--warm);font-family:var(--font-b)}

/* ═══════════════════════ GALLERY ═══════════════════════ */
.gallery-section{background:var(--brown);padding:0}
.gallery-header{padding:80px 0 48px;text-align:center}
.gallery-mosaic{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:240px 240px;gap:3px}
.gal-item{overflow:hidden;position:relative;cursor:pointer}
.gal-item.tall{grid-row:span 2}
.gal-item.wide{grid-column:span 2}
.gal-item img{width:100%;height:100%;object-fit:cover;filter:brightness(.8) saturate(.85);transition:transform .5s,filter .4s}
.gal-item:hover img{transform:scale(1.06);filter:brightness(.95) saturate(1)}
.gal-ov{position:absolute;inset:0;background:rgba(200,134,42,0);transition:background .3s;display:flex;align-items:center;justify-content:center}
.gal-item:hover .gal-ov{background:rgba(200,134,42,.15)}

/* ═══════════════════════ TESTIMONIALS ═══════════════════════ */
.reviews-section{background:var(--cream)}
.reviews-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.review-card{background:#fff;border-radius:6px;padding:28px;box-shadow:0 2px 16px rgba(44,26,14,.06);position:relative;border-top:3px solid var(--amber)}
.review-stars{color:var(--amber);font-size:14px;letter-spacing:2px;margin-bottom:14px}
.review-txt{font-family:var(--font-h);font-size:15px;font-style:italic;color:var(--warm);line-height:1.8;margin-bottom:20px;font-weight:400}
.review-txt::before{content:'\201C';font-size:40px;color:var(--amber);opacity:.3;line-height:0;vertical-align:-16px;margin-right:4px}
.review-auth{display:flex;align-items:center;gap:12px}
.review-av{width:40px;height:40px;border-radius:50%;background:var(--amber);display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.review-name{font-size:14px;font-weight:700;color:var(--brown)}
.review-meta{font-size:11px;color:var(--warm);margin-top:2px}

/* ═══════════════════════ RESERVATION ═══════════════════════ */
.res-section{background:var(--brown)}
.res-inner{display:grid;grid-template-columns:1fr 1fr;gap:0}
.res-info{padding:64px 56px;background:var(--amber);display:flex;flex-direction:column;justify-content:space-between}
.res-info h2{font-family:var(--font-h);font-size:42px;font-weight:700;color:#fff;line-height:1.05;margin-bottom:16px}
.res-info p{color:rgba(255,255,255,.85);font-size:15px;font-weight:300;line-height:1.8;margin-bottom:32px}
.res-details{display:flex;flex-direction:column;gap:16px}
.res-detail{display:flex;gap:14px;align-items:flex-start}
.res-detail-icon{font-size:18px;flex-shrink:0;margin-top:2px}
.res-detail-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.7);font-weight:700}
.res-detail-val{font-size:14px;color:#fff;font-weight:300;margin-top:2px;line-height:1.5}
.res-form-wrap{padding:64px 56px;background:var(--brown-2)}
.res-form-wrap h3{font-family:var(--font-h);font-size:28px;color:var(--cream);margin-bottom:28px}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.fg label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--light)}
.fg input,.fg select,.fg textarea{background:var(--brown-3);border:1px solid rgba(200,134,42,.2);color:var(--cream);padding:12px 16px;font-family:var(--font-b);font-size:14px;font-weight:300;outline:none;transition:border-color .2s;resize:vertical;border-radius:2px}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--amber)}
.fg select option{background:var(--brown-3)}
.fg input::placeholder,.fg textarea::placeholder{color:rgba(200,176,154,.4)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.btn-submit{width:100%;background:var(--amber);color:#fff;border:none;padding:15px;font-family:var(--font-b);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:background .2s;margin-top:8px}
.btn-submit:hover{background:var(--amber-l)}

/* ═══════════════════════ FOOTER ═══════════════════════ */
footer{background:var(--brown);border-top:1px solid rgba(200,134,42,.1);padding:64px 0 0}
.ft-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;padding-bottom:48px}
.ft-brand h3{font-family:var(--font-h);font-size:22px;font-weight:700;color:var(--cream);letter-spacing:.3px}
.ft-brand .tagline{font-family:var(--font-s);font-size:18px;color:var(--amber);margin-top:4px}
.ft-brand p{color:var(--light);font-size:13px;line-height:1.8;margin-top:12px;font-weight:300;max-width:240px}
.ft-social{display:flex;gap:10px;margin-top:20px}
.ft-social a{width:34px;height:34px;border:1px solid rgba(200,134,42,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--light);font-size:12px;transition:border-color .2s,color .2s;cursor:pointer}
.ft-social a:hover{border-color:var(--amber);color:var(--amber)}
.ft-col h4{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--amber);margin-bottom:16px;font-weight:700}
.ft-col ul{list-style:none;display:flex;flex-direction:column;gap:10px}
.ft-col li,.ft-col a{color:var(--light);font-size:13px;text-decoration:none;transition:color .2s;cursor:pointer;font-weight:300}
.ft-col a:hover{color:var(--amber)}
.ft-bot{border-top:1px solid rgba(200,134,42,.1);padding:20px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}

        <div class="tagline">Best Choma in Nairobi</div>
        <p>Serving the best nyama choma and Kenyan cuisine in South B, Nairobi. Fresh every day, warm every visit.</p>
        <div class="ft-social"><a title="Facebook">f</a><a title="Instagram">ig</a><a title="TikTok">tk</a><a href="https://wa.me/254721541206" target="_blank" title="WhatsApp">wa</a></div>
      </div>
      <div class="ft-col"><h4>Navigate</h4><ul><li><a onclick="go('home')">Home</a></li><li><a onclick="go('menu')">Our Menu</a></li><li><a onclick="go('about')">About Us</a></li><li><a onclick="go('gallery')">Gallery</a></li><li><a onclick="go('contact')">Contact</a></li></ul></div>
      <div class="ft-col"><h4>Menu Highlights</h4><ul><li>Nyama Choma</li><li>Mixed Grill Platter</li><li>Kuku Choma</li><li>Ugali & Stew</li><li>Dawa Cocktail</li></ul></div>
      <div class="ft-col"><h4>Find Us</h4><ul><li>Plainsview Road, South B</li><li>South B, Nairobi</li><li><a href="tel:+254 721 541 206">+254 721 541 206</a></li><li>Open: 10:00 AM – 10:00 PM Daily</li><li><a href="https://wa.me/254721541206" target="_blank">WhatsApp Us</a></li></ul></div>
    </div>
    <div class="ft-bot"><p>© 2025 Nerkwo Restaurant. All rights reserved.</p><p class="ft-credit">✦ Built by Visuoscope Limited · visuoscope.co.ke</p></div>
  </div>
</footer>
</template>

<script>
/* ═══════════════════════ ROUTER ═══════════════════════ */
let cur = 'home';
const app = document.getElementById('app');

function go(page){
  if(page===cur && app.innerHTML){window.scrollTo({top:0,behavior:'smooth'});return}
  app.classList.add('fading');
  setTimeout(()=>{
    cur=page;
    const tpl=document.getElementById('t-'+page);
    const ft=document.getElementById('t-footer');
    if(!tpl)return;
    app.innerHTML=tpl.innerHTML+ft.innerHTML;
    app.classList.remove('fading');
    window.scrollTo({top:0,behavior:'instant'});
    updateNav();
    initPage(page);
    revealImgs();
  },210);
}

/* ═══════════════════════ NAV ═══════════════════════ */
const nav=document.getElementById('nav');
window.addEventListener('scroll',()=>{
  nav.classList.toggle('scrolled',window.scrollY>40);
  // Switch nav to light theme on light-bg pages
  nav.classList.toggle('light',window.scrollY>80&&cur!=='home'&&cur!=='gallery');
});
document.getElementById('hbg').addEventListener('click',()=>nav.classList.toggle('open'));

function updateNav(){
  document.querySelectorAll('.nav-links a').forEach(a=>a.classList.remove('active'));
  const map={home:0,menu:1,about:2,gallery:3,contact:4};
  const links=document.querySelectorAll('.nav-links a');
  if(links[map[cur]])links[map[cur]].classList.add('active');
  // nav light/dark
  nav.classList.remove('light');
  if(cur!=='home'&&cur!=='gallery')nav.classList.add('light');
  else nav.classList.remove('light');
}

/* ═══════════════════════ PAGE INIT ═══════════════════════ */
function initPage(page){
  // Scroll fade-ups
  setTimeout(()=>{
    const obs=new IntersectionObserver((entries)=>{
      entries.forEach((e,i)=>{if(e.isIntersecting)setTimeout(()=>e.target.classList.add('vis'),i*80)});
    },{threshold:0.06});
    document.querySelectorAll('.fu').forEach(el=>obs.observe(el));
  },50);

  if(page==='menu')initMenu();
  if(page==='contact')initContact();
}

function initMenu(){
  document.querySelectorAll('.menu-tab').forEach(tab=>{
    tab.addEventListener('click',function(){
      document.querySelectorAll('.menu-tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.menu-panel').forEach(p=>p.classList.remove('active'));
      this.classList.add('active');
      const panel=document.getElementById('tab-'+this.dataset.tab);
      if(panel){panel.classList.add('active');panel.classList.add('vis')}
    });
  });
}

function initContact(){
  const form=document.getElementById('resForm');
  if(form)form.addEventListener('submit',function(e){
    e.preventDefault();
    const btn=this.querySelector('button[type="submit"]');
    btn.textContent='✓ Reservation confirmed — we\'ll WhatsApp you shortly!';
    btn.style.background='#2d7a2e';
    btn.disabled=true;
  });
}

/* ═══════════════════════ IMAGES ═══════════════════════ */
function revealImgs(){
  setTimeout(()=>{
    document.querySelectorAll('img').forEach(img=>{
      if(img.complete)img.style.opacity='1';
      else img.onload=()=>{img.style.opacity='1'};
      img.style.transition='opacity .4s ease';
    });
  },80);
}

/* ═══════════════════════ LIGHTBOX ═══════════════════════ */
function openLB(el){
  const img=el.querySelector('img');
  document.getElementById('lb-img').src=img.src.replace('w=600','w=1200').replace('w=400','w=1000');
  document.getElementById('lb').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLB(){
  document.getElementById('lb').classList.remove('open');
  document.body.style.overflow='';
}
document.getElementById('lb').addEventListener('click',e=>{if(e.target===document.getElementById('lb'))closeLB()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLB()});

/* ═══════════════════════ INIT ═══════════════════════ */
go('home');
</script>
</body>
</html>
